# Audio dotfiles - PipeWire quantum/rate configuration
# Installed by audio-dotfiles
#
# Forces stable quantum (buffer size) to 1024 frames
# Sets default rate to 48000 Hz with 44100 Hz as supported rate
# No forced upsampling - rates are preferences, not requirements

context.properties = {
    default.clock.rate = 48000
    default.clock.allowed-rates = [ 44100, 48000 ]
    default.clock.quantum = 1024
    default.clock.min-quantum = 1024
    default.clock.max-quantum = 1024
}
